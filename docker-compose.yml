services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── DB Init (runs once, then exits) ────────────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder          # has tsx + all devDeps needed for seed
    restart: "no"
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lms}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      # Override connection URLs to use Docker service names
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lms}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      GCS_KEY_FILE: /run/secrets/gcs-key
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount GCS key at runtime — never baked into the image
      - ${GCS_KEY_FILE_HOST:-./gcs-key.json}:/run/secrets/gcs-key:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: ["node", "dist/worker/resourceWorker.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lms}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      GCS_KEY_FILE: /run/secrets/gcs-key
    volumes:
      - ${GCS_KEY_FILE_HOST:-./gcs-key.json}:/run/secrets/gcs-key:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  grader:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: ["node", "dist/worker/quizGradingWorker.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lms}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      GCS_KEY_FILE: /run/secrets/gcs-key
    volumes:
      - ${GCS_KEY_FILE_HOST:-./gcs-key.json}:/run/secrets/gcs-key:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
